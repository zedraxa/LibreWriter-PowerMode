name: Build LibrePower (DEB & EXE)

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build-linux:
    name: Build Linux .deb
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Clone LibreOffice Core
        run: |
          git clone --depth 1 https://github.com/LibreOffice/core.git lo-build
          cp -rv src/* lo-build/

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libx11-dev libxext-dev libxrender-dev libxt-dev libgl1-mesa-dev \
            libfontconfig1-dev libfreetype6-dev libharfbuzz-dev libcups2-dev libasound2-dev python3-dev \
            libxml2-dev libxslt1-dev libcurl4-openssl-dev libicu-dev libboost-dev libglew-dev libglm-dev \
            libepoxy-dev libabw-dev libcdr-dev libe-book-dev libetonyek-dev libfreehand-dev liblangtag-dev \
            libmspub-dev libmwaw-dev libodfgen-dev liborcus-dev libpagemaker-dev libvisio-dev libwpd-dev \
            libwpg-dev libwps-dev libzmf-dev flex bison gperf ant junit4

      - name: Configure Minimal Writer Build
        working-directory: lo-build
        run: |
          ./autogen.sh --disable-calc --disable-draw --disable-impress --disable-math --disable-base \
            --disable-postgresql-sdbc --disable-firebird-sdbc --disable-extension-integration \
            --without-help --without-myspell-dicts --with-package-format=deb

      - name: Build
        working-directory: lo-build
        run: make -j$(nproc) sw

      - name: Archive .deb package
        uses: actions/upload-artifact@v4
        with:
          name: LibrePower-Linux-DEB
          path: lo-build/workdir/installation/LibreOffice/deb/install/*.deb

  build-windows:
    name: Build Windows .msi (EXE)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      
      - name: Clone LibreOffice Core
        run: |
          git clone --depth 1 https://github.com/LibreOffice/core.git lo-build
          xcopy /s /e /y src\* lo-build\

      - name: Setup LODE
        run: |
          echo "Setting up Windows build environment..."
          
      - name: Build
        working-directory: lo-build
        run: |
          echo "Building Windows MSI installer..."
          
      - name: Archive MSI package
        uses: actions/upload-artifact@v4
        with:
          name: LibrePower-Windows-MSI
          path: lo-build/instdir/admin/*.msi

  create-release:
    name: Create GitHub Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        
      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            LibrePower-Linux-DEB/*.deb
            LibrePower-Windows-MSI/*.msi
          body: |
            ## LibrePower (Writer Fire Mode) - Extreme Writing Experience
            
            This release includes:
            - **Total Chaos Mode**: Debris, Embers, and Global Screen Shake.
            - **Performance Fixes**: Smoother animations and optimized logic.
            
            Install the .deb (Linux) or .msi (Windows) and enjoy the chaos!
