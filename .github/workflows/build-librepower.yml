name: LibrePower CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Validate PowerMode Patch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify PowerMode Files
        run: |
          echo "🔥 LibrePower - Total Chaos Mode"
          echo "================================="
          echo ""
          echo "Verifying PowerMode patch files..."
          echo ""
          
          FILES=(
            "sw/source/uibase/docvw/flameengine.cxx"
            "sw/source/uibase/inc/flameengine.hxx"
            "sw/source/uibase/inc/powermode.hxx"
            "sw/source/uibase/docvw/edtwin2.cxx"
            "sw/source/uibase/uiview/view0.cxx"
            "sw/inc/cmdid.h"
            "sw/Library_sw.mk"
            "sw/sdi/swriter.sdi"
          )
          
          ALL_OK=true
          for f in "${FILES[@]}"; do
            if [ -f "$f" ]; then
              echo "  ✅ $f"
            else
              echo "  ❌ MISSING: $f"
              ALL_OK=false
            fi
          done
          
          echo ""
          if $ALL_OK; then
            echo "All PowerMode files present and accounted for! 🔥🦾"
          else
            echo "Some files are missing!"
            exit 1
          fi

      - name: Check FlameEngine Features
        run: |
          echo "Checking Total Chaos features..."
          echo ""
          
          check_feature() {
            if grep -q "$1" "$2" 2>/dev/null; then
              echo "  ✅ $3"
            else
              echo "  ⚠️  $3 not found"
            fi
          }
          
          check_feature "ScreenShake"    "sw/source/uibase/inc/flameengine.hxx"  "Screen Shake System"
          check_feature "EmberInstance"   "sw/source/uibase/inc/flameengine.hxx"  "Ember Particle System"
          check_feature "DebrisInstance"  "sw/source/uibase/inc/flameengine.hxx"  "Debris Physics System"
          check_feature "m_nWordCombo"    "sw/source/uibase/inc/flameengine.hxx"  "Word Combo Counter"
          check_feature "SpeedHeat"       "sw/source/uibase/docvw/flameengine.cxx" "Speed Heat Engine"
          check_feature "FN_TOGGLE_POWER_MODE" "sw/inc/cmdid.h"                   "Power Mode Toggle Command"
          
          echo ""
          echo "🔥 LibrePower Total Chaos patch validated successfully!"

  create-release:
    name: Create GitHub Release
    needs: [validate]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate Patch Archive
        run: |
          mkdir -p release
          tar czf release/librepower-patch.tar.gz \
            sw/source/uibase/docvw/flameengine.cxx \
            sw/source/uibase/inc/flameengine.hxx \
            sw/source/uibase/inc/powermode.hxx \
            sw/source/uibase/docvw/edtwin2.cxx \
            sw/source/uibase/uiview/view0.cxx \
            sw/inc/cmdid.h \
            sw/Library_sw.mk \
            sw/sdi/swriter.sdi \
            LIBREPOWER.md
          echo "📦 Patch archive created: release/librepower-patch.tar.gz"

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/librepower-patch.tar.gz
          body: |
            ## 🔥 LibrePower (Writer Fire Mode) - Total Chaos Edition
            
            ### Features
            - **Fire Engine**: Cinematic flame animations that react to your typing speed
            - **Debris & Destruction**: Particles with realistic physics fly from your cursor
            - **Ember System**: Rising sparks and glowing embers during high-speed streaks
            - **Global Screen Shake**: Every keystroke vibrates the viewport
            - **Pulsing Combo System**: Reactive word combo display
            - **One-Touch Toggle**: Fire Mode button in the Writer toolbar
            
            ### Installation
            1. Clone [LibreOffice Core](https://github.com/LibreOffice/core)
            2. Extract `librepower-patch.tar.gz` over the LibreOffice source tree
            3. Build LibreOffice Writer: `make sw`
            4. Launch: `./instdir/program/soffice --writer`
            
            Let the flames guide your pen! 🔥🦾
