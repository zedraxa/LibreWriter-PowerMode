name: Build LibrePower (Writer Only)

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CCACHE_DIR: ${{ github.workspace }}/.ccache

jobs:
  build-linux:
    name: Build Linux .deb
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-ccache-${{ hashFiles('**/*.cxx', '**/*.hxx', '**/Library_*.mk') }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake libtool pkg-config make gcc-13 g++-13 \
            libx11-dev libxext-dev libxrender-dev libxt-dev libxrandr-dev libxinerama-dev \
            libgl1-mesa-dev libglu1-mesa-dev \
            libfontconfig1-dev libfreetype6-dev libharfbuzz-dev \
            libcups2-dev libasound2-dev python3-dev \
            libxml2-dev libxslt1-dev libcurl4-openssl-dev \
            libicu-dev libboost-dev libboost-filesystem-dev libboost-locale-dev \
            libglew-dev libglm-dev libepoxy-dev \
            libabw-dev libcdr-dev libe-book-dev libetonyek-dev libfreehand-dev \
            liblangtag-dev libmspub-dev libmwaw-dev libodfgen-dev liborcus-dev \
            libpagemaker-dev libvisio-dev libwpd-dev libwpg-dev libwps-dev libzmf-dev \
            librevenge-dev libnss3-dev libnspr4-dev \
            libgtk-3-dev libdbus-glib-1-dev libkrb5-dev \
            libarchive-zip-perl libxml-parser-perl \
            flex bison gperf ant junit4 nasm zip unzip \
            ccache dpkg-dev fakeroot

      - name: Configure Minimal Writer Build
        env:
          CC: gcc-13
          CXX: g++-13
        run: |
          ./autogen.sh \
            --disable-report-builder \
            --disable-postgresql-sdbc \
            --disable-firebird-sdbc \
            --disable-extension-integration \
            --disable-odk \
            --disable-online-update \
            --disable-gstreamer-1-0 \
            --disable-database-connectivity \
            --disable-extensions \
            --disable-avmedia \
            --without-help \
            --without-myspell-dicts \
            --without-java \
            --without-doxygen \
            --enable-epm \
            --with-package-format=deb \
            --enable-ccache
        continue-on-error: false

      - name: Show config.log on failure
        if: failure()
        run: cat config.log || echo "No config.log found"

      - name: Build Writer and Dependencies
        run: make -j$(nproc) sw

      - name: Create .deb package
        run: |
          make distro-pack-install
          find workdir/installation -name "*.deb" -exec ls -lh {} \;

      - name: Archive .deb package
        uses: actions/upload-artifact@v4
        with:
          name: LibrePower-Linux-DEB
          path: workdir/installation/**/*.deb

  create-release:
    name: Create GitHub Release
    needs: [build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            LibrePower-Linux-DEB/**/*.deb
          body: |
            ## 🔥 LibrePower (Writer Fire Mode) - Total Chaos Edition
            
            This is a daily build of LibrePower Writer. Install the .deb and enjoy the chaos!
            
            Install: `sudo dpkg -i librepower-*.deb`
